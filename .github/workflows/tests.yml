name: Ejecutar tests y actualizar early

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Ejecutar tests con Maven
        run: mvn test

      - name: Actualizar rama early con main
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin
          git checkout early
          git merge main --no-ff -m "Auto-merge main into early tras pasar los tests"
          git push origin early